databaseChangeLog:
  - changeSet:
      id: 20260606000-create-table-usuarios
      author: gabriel
      changes:
        - createTable:
            tableName: usuarios
            columns:
              - column:
                  name: id_usuario
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nome_completo
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: senha_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: data_cadastro
                  type: timestamp
                  constraints:
                    nullable: false
